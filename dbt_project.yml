name: 'loan_pipeline'
version: '1.0.0'
config-version: 2

profile: 'default'

flags:
  use_materialization_v2: true

model-paths:     ["models"]
analysis-paths:  ["analyses"]
test-paths:      ["tests"]
seed-paths:      ["seeds"]
macro-paths:     ["macros"]
snapshot-paths:  ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  loan_pipeline:
    silver:
      +materialized: incremental
      +schema: silver
    gold:
      +materialized: table
      +schema: gold
